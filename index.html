<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Presente para Você</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #fff5f7;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Fundo Animado Suave */
        .bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #fff0f3 0%, #ffdde1 100%);
            z-index: -1;
        }

        /* Container do Envelope */
        .envelope-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.5s;
        }

        .envelope-wrapper:hover { transform: scale(1.02); }

        /* Estilo do Cartão/Papel */
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(255, 182, 193, 0.4);
            max-width: 450px;
            width: 90vw;
            text-align: center;
            border: 2px solid #fff;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Alex Brush', cursive;
            font-size: 3.5rem;
            color: #ff758c;
            margin-bottom: 15px;
        }

        .poem {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #7a5c61;
            font-style: italic;
            margin-bottom: 25px;
            white-space: pre-line;
            opacity: 0;
            transform: translateY(10px);
            transition: 1s all ease;
        }

        .poem.reveal { opacity: 1; transform: translateY(0); }

        /* Botões Estilizados */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background: #ff758c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3);
            width: 80%;
        }

        .btn-alt {
            background: white;
            color: #ff758c;
            border: 1px solid #ff758c;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 117, 140, 0.5); }

        /* Balão de Frase Curta */
        #frase-carinho {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #ff8fa3;
            font-weight: 500;
            min-height: 20px;
        }

        footer {
            margin-top: 30px;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: #ffb3c1;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="envelope-wrapper" id="main-card">
        <div class="card">
            <h1>Mãe</h1>
            
            <div class="poem" id="poem-text">
                Seu amor é o que me sustenta,
                A luz que guia cada decisão.
                Obrigado por ser meu exemplo de força,
                E por todo o carinho que transborda no coração.
                
                Neste dia, celebro a mulher incrível que você é.
            </div>

            <div class="btn-group">
                <button class="btn" onclick="revealPoem(this)">Abrir Mensagem ✨</button>
                <button class="btn btn-alt" onclick="gerarFrase()">Outro Carinho ❤</button>
            </div>

            <div id="frase-carinho"></div>

            <footer>Com todo amor, Adrian</footer>
        </div>
    </div>

    <script>
        const frases = [
            "Você é meu maior orgulho!",
            "Obrigado por tudo, sempre.",
            "Teu abraço é o melhor lugar do mundo.",
            "Você brilha mais que qualquer estrela!",
            "Minha heroína favorita é você.",
            "Obrigado por acreditar em mim."
        ];

        function revealPoem(btn) {
            // Efeito de Confete de Coração
            var end = Date.now() + (2 * 1000);
            var colors = ['#ff758c', '#ffb3c1', '#ffffff'];

            (function frame() {
              confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: colors,
                shapes: ['heart']
              });
              confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: colors,
                shapes: ['heart']
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());

            document.getElementById('poem-text').classList.add('reveal');
            btn.style.display = 'none';
        }

        function gerarFrase() {
            const el = document.getElementById('frase-carinho');
            const randomFrase = frases[Math.floor(Math.random() * frases.length)];
            
            // Efeito de fade simples
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = randomFrase;
                el.style.opacity = 1;
            }, 200);

            // Pequena explosão de confete no botão
            confetti({
                particleCount: 40,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#ff758c', '#ffd1dc']
            });
        }
    </script>
</body>
</html>
